name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - name: Build tray app + installer
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X github.com/salehkreiner/scrubadubber/internal/version.Version=${VERSION}"
          mkdir -p dist
          # Embed asInvoker manifest + icon + version into each command.
          go run github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest \
            -o cmd/scrubadubber/resource.syso packaging/windows/versioninfo.json
          go run github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest \
            -o cmd/installer/resource.syso packaging/windows/versioninfo.json
          # Tray app: GUI subsystem (no console window). Asset name must match
          # config.AppAssetName() so the updater/installer can fetch it.
          go build -trimpath -ldflags "${LDFLAGS} -H windowsgui" \
            -o dist/scrubadubber_windows_amd64.exe ./cmd/scrubadubber
          # Installer: console subsystem so progress is visible.
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/scrubadubber-setup.exe ./cmd/installer
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - name: Build per-arch binaries, universal .app, and .dmg
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X github.com/salehkreiner/scrubadubber/internal/version.Version=${VERSION}"
          mkdir -p dist
          # Per-arch raw binaries for the self-updater (config.AppAssetName()).
          for ARCH in amd64 arm64; do
            CGO_ENABLED=1 GOOS=darwin GOARCH="${ARCH}" go build -trimpath \
              -ldflags "${LDFLAGS}" -o "dist/scrubadubber_darwin_${ARCH}" ./cmd/scrubadubber
          done
          # Universal .app + drag-install .dmg.
          bash packaging/macos/build-app.sh "${VERSION}"
          bash packaging/macos/build-dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist/scrubadubber_darwin_amd64
            dist/scrubadubber_darwin_arm64
            dist/scrubadubber.dmg

  publish:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > /tmp/checksums.txt
          mv /tmp/checksums.txt checksums.txt
          cat checksums.txt
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
